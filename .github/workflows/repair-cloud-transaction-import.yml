name: Repair Cloud Transaction Import

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-cloud-transaction-import.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply and validate repair
        run: python3 scripts/repair_cloud_transaction_import.py

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/private-cloud-warehouse-v3.js .diagnostics/cloud-transaction-repair.txt
          if ! git diff --cached --quiet; then
            git commit -m "Repair private cloud transaction import"
            git push
          fi

      - name: Deploy repaired page
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
