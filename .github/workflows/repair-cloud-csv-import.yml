name: Repair Cloud CSV Import

on:
  push:
    paths:
      - '.github/workflows/repair-cloud-csv-import.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch cloud CSV compatibility
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')

          def replace_once(src, old, new, label):
              count = src.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 match, found {count}')
              return src.replace(old, new, 1)

          old_date = '''const toISODate = (d) => {
  if (typeof d === "number" && isFinite(d)) { 
    const dateObj = new Date(Math.round((d - 25569) * 86400000)); 
    return `${dateObj.getUTCFullYear()}-${String(dateObj.getUTCMonth()+1).padStart(2,'0')}-${String(dateObj.getUTCDate()).padStart(2,'0')}`; 
  }
  const s = String(d || "").trim();
  if (!s) return "";
  const isoMatch = s.match(/^(\\d{4})[-\\/.](\\d{1,2})[-\\/.](\\d{1,2})/);
  if (isoMatch) return `${isoMatch[1]}-${isoMatch[2].padStart(2,'0')}-${isoMatch[3].padStart(2,'0')}`;
  const euMatch = s.match(/^(\\d{1,2})[-\\/.](\\d{1,2})[-\\/.](\\d{4})/);
  if (euMatch) {
      const p1 = parseInt(euMatch[1], 10), p2 = parseInt(euMatch[2], 10), y = parseInt(euMatch[3], 10);
      let m = p1, day = p2; if (p1 > 12) { day = p1; m = p2; }
      return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }
  const dt = new Date(s); 
  if (!isNaN(dt.getTime())) return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  return ""; 
};'''
          new_date = '''const toISODate = (d) => {
  if (typeof d === "number" && isFinite(d)) { 
    const dateObj = new Date(Math.round((d - 25569) * 86400000)); 
    return `${dateObj.getUTCFullYear()}-${String(dateObj.getUTCMonth()+1).padStart(2,'0')}-${String(dateObj.getUTCDate()).padStart(2,'0')}`; 
  }
  const s = String(d || "").trim();
  if (!s) return "";
  const isoMatch = s.match(/^(\\d{4})[-\\/.](\\d{1,2})[-\\/.](\\d{1,2})/);
  if (isoMatch) return `${isoMatch[1]}-${isoMatch[2].padStart(2,'0')}-${isoMatch[3].padStart(2,'0')}`;
  const zhMatch = s.match(/^(\\d{4})年\\s*(\\d{1,2})月\\s*(\\d{1,2})日?/);
  if (zhMatch) return `${zhMatch[1]}-${zhMatch[2].padStart(2,'0')}-${zhMatch[3].padStart(2,'0')}`;
  const euMatch = s.match(/^(\\d{1,2})[-\\/.](\\d{1,2})[-\\/.](\\d{4})/);
  if (euMatch) {
      const p1 = parseInt(euMatch[1], 10), p2 = parseInt(euMatch[2], 10), y = parseInt(euMatch[3], 10);
      let m = p1, day = p2; if (p1 > 12) { day = p1; m = p2; }
      return `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }
  const dt = new Date(s); 
  if (!isNaN(dt.getTime())) return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  return ""; 
};'''
          text = replace_once(text, old_date, new_date, 'Chinese date parser')

          alias_replacements = {
            'targeting: ["投放","Targeting","KeywordorProductTargeting","Keyword","关键词"],': 'targeting: ["投放","投放方案","匹配的目标","Targeting","KeywordorProductTargeting","Keyword","关键词"],',
            'matchType: ["匹配类型","Matchtype","MatchType"],': 'matchType: ["匹配类型","投放匹配类型","投放匹配类型-Targeting match type","Matchtype","MatchType"],',
            'searchTerm: ["客户搜索词","Customersearchterm","Searchterm","SearchTerm"],': 'searchTerm: ["客户搜索词","搜索词","Customersearchterm","Searchterm","SearchTerm"],',
            'spend: ["花费","Spend","Cost"],': 'spend: ["花费","总成本","Spend","Cost"],',
            'sales7d: ["7天总销售额","7DayTotalSales","7-daytotalsales","7daytotalsales","14天总销售额","14DayTotalSales","14-daytotalsales","14daytotalsales","TotalSales","Est.TotalSales", "Sales"],': 'sales7d: ["7天总销售额","14天总销售额","销售额","7DayTotalSales","7-daytotalsales","7daytotalsales","14DayTotalSales","14-daytotalsales","14daytotalsales","TotalSales","Est.TotalSales", "Sales"],',
            'orders7d: ["7天总订单数","7天总订单数(#)","7天总订单数（#）","7DayTotalOrders(#)","7-daytotalorders","7daytotalorders","14天总订单数","14天总订单数(#)","14DayTotalOrders(#)","14-daytotalorders","14daytotalorders","TotalOrders","Est.TotalOrders", "Orders"],': 'orders7d: ["7天总订单数","7天总订单数(#)","7天总订单数（#）","14天总订单数","14天总订单数(#)","购买量","7DayTotalOrders(#)","7-daytotalorders","7daytotalorders","14DayTotalOrders(#)","14-daytotalorders","14daytotalorders","TotalOrders","Est.TotalOrders", "Orders"],',
            'units: ["7天总销售量(#)","7天总销售量（#）","7天总销售量","7 Day Total Units (#)","7DayTotalUnits(#)","7DayTotalUnits","7-day Total Units","7 Day Total Units","14天总销售量(#)","14天总销售量（#）","14天总销售量","14 Day Total Units (#)","14DayTotalUnits(#)","14DayTotalUnits","14-day Total Units","14 Day Total Units","Units Sold","Units","销售件数","广告销售件数"],': 'units: ["7天总销售量(#)","7天总销售量（#）","7天总销售量","14天总销售量(#)","14天总销售量（#）","14天总销售量","已售商品数量","7 Day Total Units (#)","7DayTotalUnits(#)","7DayTotalUnits","7-day Total Units","7 Day Total Units","14 Day Total Units (#)","14DayTotalUnits(#)","14DayTotalUnits","14-day Total Units","14 Day Total Units","Units Sold","Units","销售件数","广告销售件数"],',
            'cvr: ["7天的转化率","7DayConversionRate","7-dayconversionrate","7dayconversionrate","14天的转化率","14DayConversionRate","14-dayconversionrate","14dayconversionrate"],': 'cvr: ["7天的转化率","14天的转化率","购买率","7DayConversionRate","7-dayconversionrate","7dayconversionrate","14DayConversionRate","14-dayconversionrate","14dayconversionrate"],',
            'advertisedSales: ["7天内广告SKU销售额","7天广告SKU销售额","14天内广告SKU销售额","14天广告SKU销售额","7 Day Advertised SKU Sales","14 Day Advertised SKU Sales","Advertised SKU Sales","Advertised Sales","广告商品销售额"],': 'advertisedSales: ["7天内广告SKU销售额","7天广告SKU销售额","14天内广告SKU销售额","14天广告SKU销售额","推广商品的销量","7 Day Advertised SKU Sales","14 Day Advertised SKU Sales","Advertised SKU Sales","Advertised Sales","广告商品销售额"],',
            'advertisedUnits: ["7天内广告SKU销售量(#)","7天内广告SKU销售量（#）","7天广告SKU销售量","14天内广告SKU销售量(#)","14天内广告SKU销售量（#）","14天广告SKU销售量","7 Day Advertised SKU Units","14 Day Advertised SKU Units","Advertised SKU Units","广告商品销售量"],': 'advertisedUnits: ["7天内广告SKU销售量(#)","7天内广告SKU销售量（#）","7天广告SKU销售量","14天内广告SKU销售量(#)","14天内广告SKU销售量（#）","14天广告SKU销售量","已售商品数量（推广）","7 Day Advertised SKU Units","14 Day Advertised SKU Units","Advertised SKU Units","广告商品销售量"],',
            'otherSkuSales: ["7天内其他SKU销售额","7天其他SKU销售额","14天内其他SKU销售额","14天其他SKU销售额","7 Day Other SKU Sales","14 Day Other SKU Sales","Other SKU Sales","Halo Sales","其他SKU销售额"],': 'otherSkuSales: ["7天内其他SKU销售额","7天其他SKU销售额","14天内其他SKU销售额","14天其他SKU销售额","销售额（光环）","7 Day Other SKU Sales","14 Day Other SKU Sales","Other SKU Sales","Halo Sales","其他SKU销售额"],',
            'otherSkuUnits: ["7天内其他SKU销售量(#)","7天内其他SKU销售量（#）","7天其他SKU销售量","14天内其他SKU销售量(#)","14天内其他SKU销售量（#）","14天其他SKU销售量","7 Day Other SKU Units","14 Day Other SKU Units","Other SKU Units","其他SKU销售量"],': 'otherSkuUnits: ["7天内其他SKU销售量(#)","7天内其他SKU销售量（#）","7天其他SKU销售量","14天内其他SKU销售量(#)","14天内其他SKU销售量（#）","14天其他SKU销售量","已售商品数量（光环）","7 Day Other SKU Units","14 Day Other SKU Units","Other SKU Units","其他SKU销售量"],'
          }
          for old,new in alias_replacements.items():
              text = replace_once(text, old, new, f'alias {old.split(":",1)[0]}')

          old_parse = 'const parseCSV = async file => {const prefix=await file.slice(0,262144).text(),headerLine=findTransactionHeaderLine(prefix);if(headerLine>=0){const text=await file.text(),lines=text.replace(/^\\uFEFF/,"").split(/\\r?\\n/),start=findTransactionHeaderLine(text),body=lines.slice(Math.max(0,start)).join("\\n");return new Promise((resolve,reject)=>Papa.parse(body,{header:true,skipEmptyLines:"greedy",worker:false,dynamicTyping:false,complete:res=>resolve(res.data||[]),error:reject}));}return new Promise((resolve,reject)=>Papa.parse(file,{header:true,skipEmptyLines:"greedy",worker:true,dynamicTyping:false,complete:res=>resolve(res.data||[]),error:reject}));};'
          new_parse = '''const parseCSV = async file => {
  const prefix=await file.slice(0,262144).text(),headerLine=findTransactionHeaderLine(prefix),isCloudFile=/^(?:ALL|YTDBNS|YY|JJ)__/.test(String(file?.name||"").toUpperCase());
  if(headerLine>=0||isCloudFile){
    const text=await file.text(),lines=text.replace(/^\\uFEFF/,"").split(/\\r?\\n/),start=headerLine>=0?findTransactionHeaderLine(text):0,body=lines.slice(Math.max(0,start)).join("\\n");
    return new Promise((resolve,reject)=>Papa.parse(body,{header:true,skipEmptyLines:"greedy",worker:false,dynamicTyping:false,complete:res=>resolve(res.data||[]),error:reject}));
  }
  return new Promise((resolve,reject)=>Papa.parse(file,{header:true,skipEmptyLines:"greedy",worker:true,dynamicTyping:false,complete:res=>resolve(res.data||[]),error:reject}));
};'''
          text = replace_once(text, old_parse, new_parse, 'cloud CSV parser')

          old_bridge = 'window.__LR_IMPORT_MULTIPLE_FILES__ = async files => importMultipleFiles(files);'
          new_bridge = '''window.__LR_IMPORT_MULTIPLE_FILES__ = async files => {
  await importMultipleFiles(files);
  return {
    acceptedRows: Number(AdsStore.importStats?.acceptedRows||0),
    adsRows: Number(AdsStore.all?.length||0),
    transactionRows: Number(AdsStore.transactions?.length||0),
    businessRows: Number(AdsStore.biz?.length||0),
    files: (AdsStore.files||[]).map(x=>({name:x.name,rows:Number(x.rows||0),type:x.type||""})),
    quarantine: (AdsStore.quarantine||[]).map(x=>({fileName:x.fileName||"",reportType:x.reportType||"",reasons:Array.isArray(x.reasons)?x.reasons:[]}))
  };
};'''
          text = replace_once(text, old_bridge, new_bridge, 'import result bridge')

          index.write_text(text,encoding='utf-8')

          cloud_files=[Path('assets/private-cloud-warehouse-v3.js'),index]
          old_import='''      setStatus(`已下载 ${entries.length} 个文件，正在按 ${scope} 范围建立分析索引…`);
      try {
        await cloudImporter(csvFiles);
      } finally {
        if (mergeSelect) mergeSelect.value = previousMerge;
      }

      let costSummary = null;'''
          new_import='''      setStatus(`已下载 ${entries.length} 个文件，正在按 ${scope} 范围建立分析索引…`);
      let importSummary = null;
      try {
        importSummary = await cloudImporter(csvFiles);
      } finally {
        if (mergeSelect) mergeSelect.value = previousMerge;
      }
      const importedRows = Number(importSummary?.acceptedRows || 0);
      const adsRows = Number(importSummary?.adsRows || 0);
      const transactionRows = Number(importSummary?.transactionRows || 0);
      const quarantineText = (importSummary?.quarantine || []).flatMap(item => (item.reasons || []).map(reason => `${item.fileName || item.reportType}: ${reason}`)).slice(0, 3).join('；');
      const expectsAds = entries.some(entry => String(entry?.dataType || '').toLowerCase().replace(/[^a-z]/g, '') === 'ads');
      if (!importedRows || (expectsAds && !adsRows)) {
        throw new Error(`报表已下载，但网页分析库未写入广告数据${quarantineText ? `：${quarantineText}` : '；请检查报表字段映射'}`);
      }

      let costSummary = null;'''
          old_total='const totalRows = Number(fetchedRows || manifest?.totalRows || 0);'
          new_total='const totalRows = Number(importedRows || fetchedRows || manifest?.totalRows || 0);'
          for path in cloud_files:
              src=path.read_text(encoding='utf-8')
              count=src.count(old_import)
              if count!=1:
                  raise SystemExit(f'{path}: cloud import block expected 1 match, found {count}')
              src=src.replace(old_import,new_import,1)
              count=src.count(old_total)
              if count!=1:
                  raise SystemExit(f'{path}: total rows expected 1 match, found {count}')
              src=src.replace(old_total,new_total,1)
              path.write_text(src,encoding='utf-8')

          final=index.read_text(encoding='utf-8')
          checks=['总成本','购买量','销售额','搜索词','zhMatch','isCloudFile','acceptedRows: Number(AdsStore.importStats','网页分析库未写入广告数据']
          missing=[x for x in checks if x not in final]
          if missing: raise SystemExit(f'missing checks: {missing}')
          print('Cloud CSV import compatibility patched successfully')
          PY
      - name: Commit repaired importer
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add index.html assets/private-cloud-warehouse-v3.js
          git diff --cached --quiet || git commit -m "Fix private cloud CSV import and field mapping"
          git push
