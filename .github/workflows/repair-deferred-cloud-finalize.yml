name: Repair Deferred Cloud Finalize

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/repair-deferred-cloud-finalize.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply and validate deferred-finalize repair
        run: python3 scripts/repair_deferred_cloud_finalize.py

      - name: Commit repaired files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/private-cloud-warehouse-v3.js .diagnostics/deferred-cloud-finalize.txt
          if ! git diff --cached --quiet; then
            git commit -m "Defer full analysis until final cloud import batch"
            git push
          fi

      - name: Deploy updated page
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
