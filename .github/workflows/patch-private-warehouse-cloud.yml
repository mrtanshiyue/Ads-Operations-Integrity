name: Connect Private Warehouse Cloud

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-private-warehouse-cloud.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate cloud loader source
        run: node --check assets/private-cloud-warehouse-v3.js

      - name: Replace legacy private cloud loader
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          page = Path('index.html')
          source = page.read_text(encoding='utf-8')
          loader = Path('assets/private-cloud-warehouse-v3.js').read_text(encoding='utf-8').strip()
          pattern = re.compile(r'<script id="privateCloudImportV6147">.*?</script>', re.S)
          replacement = '<script id="privateCloudImportV6147">\n' + loader + '\n</script>'
          updated, count = pattern.subn(lambda _: replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected one privateCloudImportV6147 block, found {count}')
          page.write_text(updated, encoding='utf-8')
          PY

      - name: Validate every inline JavaScript block
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', source, flags=re.S|re.I)
          target = Path('/tmp/inline-js')
          target.mkdir(exist_ok=True)
          for index, script in enumerate(scripts):
              (target / f'{index:03d}.js').write_text(script, encoding='utf-8')
          print(f'Extracted {len(scripts)} inline scripts')
          PY
          for file in /tmp/inline-js/*.js; do node --check "$file"; done

      - name: Remove temporary diagnostics
        run: |
          rm -f .github/workflows/extract-private-cloud-context.yml
          rm -f diagnostics/private-cloud-context.txt diagnostics/cloud-import-bridge.txt
          rmdir diagnostics 2>/dev/null || true

      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet || git commit -m "Connect private warehouse cloud loading"
          git push
