name: Install Direct Transaction Fallback

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/install-direct-transaction-fallback.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install and validate fallback
        run: python3 scripts/install_direct_transaction_fallback.py

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/private-cloud-warehouse-v3.js .diagnostics/direct-transaction-fallback.txt
          if ! git diff --cached --quiet; then
            git commit -m "Install direct private cloud transaction fallback"
            git push
          fi

      - name: Deploy repaired page
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
