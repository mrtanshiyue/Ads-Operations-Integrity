name: Deploy Ads Operations Integrity

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.pages.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare static site
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source = Path('index.html')
          if not source.exists() or source.stat().st_size < 1000:
              raise SystemExit('index.html is missing or unexpectedly small')

          data = source.read_bytes()
          fixes = (
              (b"newline: '\r\n'", b"newline: '\\r\\n'"),
              (b"newline: '\n'", b"newline: '\\r\\n'"),
          )
          applied = 0
          for broken, corrected in fixes:
              count = data.count(broken)
              if count:
                  data = data.replace(broken, corrected)
                  applied += count

          output = Path('_site')
          output.mkdir(exist_ok=True)
          (output / 'index.html').write_bytes(data)
          (output / '.nojekyll').write_text('', encoding='utf-8')
          print(f'Prepared {len(data):,} bytes; repaired {applied} broken newline literal(s)')
          PY

      - name: Extract inline JavaScript
        shell: bash
        run: |
          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class ScriptExtractor(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=False)
                  self.active = False
                  self.current = []
                  self.scripts = []

              def handle_starttag(self, tag, attrs):
                  if tag.lower() != 'script':
                      return
                  values = {k.lower(): (v or '') for k, v in attrs}
                  script_type = values.get('type', '').lower()
                  self.active = 'src' not in values and script_type in ('', 'text/javascript', 'application/javascript')
                  self.current = []

              def handle_endtag(self, tag):
                  if tag.lower() == 'script' and self.active:
                      self.scripts.append(''.join(self.current))
                      self.active = False
                      self.current = []

              def handle_data(self, data):
                  if self.active:
                      self.current.append(data)

          html = Path('_site/index.html').read_text(encoding='utf-8')
          parser = ScriptExtractor()
          parser.feed(html)
          target = Path('.validate')
          target.mkdir(exist_ok=True)
          for index, script in enumerate(parser.scripts, 1):
              (target / f'inline-{index:03d}.js').write_text(script, encoding='utf-8')
          print(f'Extracted {len(parser.scripts)} inline script(s)')
          PY

      - name: Validate JavaScript syntax
        shell: bash
        run: find .validate -type f -name '*.js' -print0 | xargs -0 -r -n 1 node --check

      - name: Publish repaired site branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show-ref --verify --quiet refs/heads/gh-pages || git fetch origin gh-pages:gh-pages
          rm -rf /tmp/ads-operations-gh-pages
          git worktree add /tmp/ads-operations-gh-pages gh-pages
          find /tmp/ads-operations-gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a _site/. /tmp/ads-operations-gh-pages/
          cd /tmp/ads-operations-gh-pages
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Deploy repaired static site"
            git push origin gh-pages
          else
            echo "gh-pages is already current"
          fi

      - name: Configure Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Record Pages readiness
        shell: bash
        run: |
          cd /tmp/ads-operations-gh-pages
          printf '%s\n' "${{ steps.pages.outcome }}" > .pages-status
          git add .pages-status
          if ! git diff --cached --quiet; then
            git commit -m "Record Pages configuration status"
            git push origin gh-pages
          fi

      - name: Upload Pages artifact
        if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: needs.build.outputs.pages_ready == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
