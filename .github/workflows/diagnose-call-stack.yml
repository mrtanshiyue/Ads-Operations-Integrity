name: Diagnose Import Call Stack
# Extract compact hotspots around large-array operations

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnose-call-stack.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract compact hotspots
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lines = Path('index.html').read_text(encoding='utf-8').splitlines()
          out = []
          for start, end in [(6460,6575),(7380,7450),(13970,14140),(4688,4735),(6020,6135)]:
              out.append(f'=== source lines {start}-{end} ===')
              for index in range(start - 1, min(end, len(lines))):
                  out.append(f'{index + 1}: {lines[index]}')
              out.append('')
          Path('.diagnostics').mkdir(exist_ok=True)
          Path('.diagnostics/call-stack-hotspots.txt').write_text('\n'.join(out) + '\n', encoding='utf-8')
          print('\n'.join(out))
          PY

      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .diagnostics/call-stack-hotspots.txt
          if ! git diff --cached --quiet; then
            git commit -m "Record compact import call stack hotspots"
            git push
          fi
