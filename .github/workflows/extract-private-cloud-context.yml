name: Extract Private Cloud Context

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/extract-private-cloud-context.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract focused source contexts
        run: |
          python - <<'PY'
          from pathlib import Path

          src = Path('index.html').read_text(encoding='utf-8')
          lines = src.splitlines()
          markers = [
              'TRANSACTION_MAP_ALIASES',
              'buildTransactionMap',
              'normalizeTransactionRow',
              '__LR_IMPORT_MULTIPLE_FILES__',
              '__LR_IMPORT_PRODUCT_COSTS__',
              'fileInput.addEventListener',
              'Papa.parse',
              'XLSX.read',
              'detectReportType',
              'processFiles',
              'handleFiles',
              'privateCloudImportV6147',
              'shopScopeUiV1',
          ]
          ranges = []
          for marker in markers:
              hits = [i for i, line in enumerate(lines) if marker in line]
              for i in hits:
                  ranges.append((max(0, i-55), min(len(lines), i+120), marker))
          ranges.sort()
          merged = []
          for start, end, marker in ranges:
              if not merged or start > merged[-1][1] + 2:
                  merged.append([start, end, {marker}])
              else:
                  merged[-1][1] = max(merged[-1][1], end)
                  merged[-1][2].add(marker)
          out = []
          for start, end, names in merged:
              out.append(f'\n===== {", ".join(sorted(names))} · SOURCE {start+1}-{end} =====\n')
              out.extend(f'{n+1:06d}: {lines[n]}' for n in range(start, end))
          Path('diagnostics').mkdir(exist_ok=True)
          Path('diagnostics/cloud-import-bridge.txt').write_text('\n'.join(out), encoding='utf-8')
          PY
      - name: Commit extracted context
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add diagnostics/cloud-import-bridge.txt
          git diff --cached --quiet || git commit -m "Extract focused cloud import bridge context"
          git push
