name: Shorten YT Shop Label

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/shorten-yt-shop-label.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply YT display label patch
        id: apply
        continue-on-error: true
        run: |
          mkdir -p .diagnostics
          set +e
          python3 scripts/shorten_yt_shop_label.py > .diagnostics/yt-shop-label-run.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat .diagnostics/yt-shop-label-run.log
          exit 0

      - name: Commit patch and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/private-cloud-warehouse-v3.js .github/workflows/patch-shop-scope-ui.yml .diagnostics/yt-shop-label-patch.txt .diagnostics/yt-shop-label-run.log 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Record YT shop label patch result"
            git push
          fi

      - name: Fail when patch failed
        if: steps.apply.outputs.exit_code != '0'
        run: exit 1

      - name: Deploy updated page
        if: steps.apply.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
