name: Repair Cloud CSV Import V4

on:
  workflow_dispatch:
  push:
    paths:
      - scripts/repair_cloud_csv_import_v4.py
      - .github/workflows/repair-cloud-csv-import-v3.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Repair cloud CSV importer
        id: repair
        continue-on-error: true
        run: python scripts/repair_cloud_csv_import_v4.py

      - name: Commit repaired webpage and diagnostics
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/private-cloud-warehouse-v3.js .diagnostics/repair-cloud-csv-v4.log
          git diff --cached --quiet || git commit -m "Repair cloud CSV importer compatibility"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Report repair result
        if: always()
        run: |
          cat .diagnostics/repair-cloud-csv-v4.log || true
          test "${{ steps.repair.outcome }}" = "success"
