name: Shorten YT Shop Label V3

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/shorten-yt-shop-label-v3.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply and validate YT display label patch
        run: python3 scripts/shorten_yt_shop_label.py

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/private-cloud-warehouse-v3.js .github/workflows/patch-shop-scope-ui.yml .diagnostics/yt-shop-label-patch.txt
          if ! git diff --cached --quiet; then
            git commit -m "Display YT instead of YTDBNS in shop UI"
            git push
          fi

      - name: Deploy updated page
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
